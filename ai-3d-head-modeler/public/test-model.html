<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Test</title>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 20px;
      border: 2px solid #2D2D2D;
      box-shadow: 4px 4px 0px #2D2D2D;
      z-index: 100;
    }
    #info h2 { margin: 0 0 10px 0; font-size: 16px; }
    #status { font-size: 14px; color: #666; }
    .success { color: green !important; }
    .error { color: red !important; }
  </style>
</head>
<body>
  <div id="info">
    <h2>🎲 3D 模型加载测试</h2>
    <div id="status">正在初始化...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    const statusEl = document.getElementById('status');
    
    // 创建场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f5f0);
    
    // 创建相机
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 4);
    
    // 创建渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    
    // 添加灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(10, 10, 5);
    scene.add(directionalLight);
    
    // 添加轨道控制器
    let controls;
    import('three/addons/controls/OrbitControls.js').then((module) => {
      controls = new module.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 2;
    });
    
    // 加载模型
    statusEl.textContent = '正在加载模型...';
    statusEl.className = '';
    
    const loader = new GLTFLoader();
    loader.load(
      '/model.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.set(2.5, 2.5, 2.5);
        model.position.set(0, -1, 0);
        scene.add(model);
        
        statusEl.textContent = '✅ 模型加载成功！';
        statusEl.className = 'success';
        
        // 开始动画循环
        animate();
      },
      (xhr) => {
        const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
        statusEl.textContent = `加载中... ${percent}%`;
      },
      (error) => {
        console.error('模型加载失败:', error);
        statusEl.textContent = '❌ 加载失败：' + error.message;
        statusEl.className = 'error';
      }
    );
    
    function animate() {
      requestAnimationFrame(animate);
      if (controls) controls.update();
      renderer.render(scene, camera);
    }
    
    // 处理窗口大小变化
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
